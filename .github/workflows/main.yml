name: Build ClassicLockScreen

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/releases/download/master/iPhoneOS15.5.sdk.tar.xz | tar -xJ -C $HOME/theos/sdks

      - name: Build
        run: |
          export THEOS=$HOME/theos
          make package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ClassicLockScreen
          path: packages/*.deb
